<!DOCTYPE html>
<!-- DOC: client\cotizadorcp\montajes.html | Proposito: Vista de premontajes (redireccion interna). | Ver docs/10-funcionamiento-general-del-codigo.txt -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Redirigiendo - Premontajes</title>
    <script src="../js/hub-config.js"></script>
    <script src="../services/pb-core.js"></script>
    <script src="../services/_shared.js"></script>
    <script src="../services/auth.js"></script>
    <script src="../services/pb-client.js"></script>
    <script>const TENANT_SCHEMA='finanzas_casadepiedra';</script>
    <script src="../js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.__HUB_LAYOUT_READY && typeof window.__HUB_LAYOUT_READY.then === 'function') {
                try { await window.__HUB_LAYOUT_READY; } catch (_) {}
            }
            if (window.__HUB_PAGE_ACCESS_DENIED) return;
            const target = 'agenda.html?kind=premontaje';
            try { window.__HUB_ALLOW_NEXT_UNLOAD?.('cp_montajes_redirect'); } catch (_) {}
            if (typeof window.__HUB_SAFE_NAVIGATE === 'function') {
                window.__HUB_SAFE_NAVIGATE(target, { allowSamePage: true });
            } else {
                window.location.replace(target);
            }
        });
    </script>
    <!-- Local Animations -->
    <link rel="preload" as="style" href="../../assets/libs/css/animate.min.css">
    <link rel="stylesheet" href="../../assets/libs/css/animate.min.css">
</head>
<body>
    <p>Redirigiendo al calendario unificado...</p>
</body>
</html>
